<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Temperaturas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #1a1a2e;
            color: #eee;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: #16213e;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            margin-bottom: 8px;
            font-size: 22px;
            color: #e94560;
        }
        p.subtitle {
            text-align: center;
            color: #888;
            font-size: 13px;
            margin-bottom: 24px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #aaa;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #0f3460;
            border-radius: 10px;
            background: #1a1a2e;
            color: #fff;
            font-size: 18px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #e94560; }
        button {
            width: 100%;
            padding: 12px;
            margin-top: 16px;
            border: none;
            border-radius: 10px;
            background: #e94560;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #c73650; }
        .result {
            margin-top: 24px;
            padding: 20px;
            background: #0f3460;
            border-radius: 12px;
            display: none;
        }
        .result.show { display: block; }
        .result-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .result-row:last-child { border: none; }
        .result-label { color: #aaa; font-size: 14px; }
        .result-value { color: #e94560; font-weight: 700; font-size: 18px; }
        .error {
            color: #ff6b6b;
            text-align: center;
            margin-top: 12px;
            font-size: 13px;
            display: none;
        }
        .error.show { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌡️ Conversor de Temperaturas</h1>
        <p class="subtitle">Ingresa la temperatura en grados Celsius</p>

        <label for="celsius">Temperatura en °C</label>
        <input type="text" id="celsius" placeholder="Ej: 45" autofocus>

        <button onclick="convertir()">Convertir</button>

        <div class="error" id="error">⚠️ Por favor ingresa un valor numérico válido.</div>

        <div class="result" id="result">
            <div class="result-row">
                <span class="result-label">Celsius</span>
                <span class="result-value" id="resCelsius">--</span>
            </div>
            <div class="result-row">
                <span class="result-label">Fahrenheit</span>
                <span class="result-value" id="resFahrenheit">--</span>
            </div>
            <div class="result-row">
                <span class="result-label">Kelvin</span>
                <span class="result-value" id="resKelvin">--</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
